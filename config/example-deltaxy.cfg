# This file contains common pin mappings for the BIGTREETECH Manta M4P
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication.

# See docs/Config_Reference.md for a description of parameters.

[gcode_arcs]

[stepper_left]
step_pin: PC6
dir_pin: PA14
enable_pin: !PC7
microsteps: 64
rotation_distance: 40	# 20T GT3 2mm pitch
endstop_pin: ^PC0
arm_length_mm: 148.66   # distance from left shoulder center to toolhead center
position_endstop: 144   # in mm. The Y position of the left shoulder at the enstop contact position. This is relative to the upper edge of the build area
position_max: 144.5     # must be slightly > than the endstop position.
position_min: 13.5        # fully-forward Y position of the left shoulder, relative to the upper edge of the build area
homing_speed: 5         # set slowly for now. make faster after machine is validated.

[stepper_right]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 64
rotation_distance: 40	# 20T GT3 2mm pitch
endstop_pin: ^PC1
arm_length_mm: 148.66   # distance from right shoulder center to toolhead center
position_endstop: 144
position_max: 144.5     # slightly > than endstop position
position_min: 13.5      # fully-forward y position of the right shoulder, relative to the upper edge of the build area
homing_speed: 5

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 2.54
endstop_pin: ^PC2
#position_endstop: 102.2
position_min: -2.0
position_max: 104	# slightly > than endstop position

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD5
microsteps: 16
rotation_distance: 7.78
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PA0
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 250
max_extrude_cross_section: 2.0
pressure_advance: 0.5

[bed_tilt]
x_adjust: 0.0023
y_adjust: -0.006
z_adjust: 0.0

#[filament_switch_sensor filament_sensor]
#switch_pin: ^!PC15

[heater_bed]
heater_pin: PD8
sensor_type: Generic 3950
sensor_pin: PC4
control: watermark
min_temp: 0
max_temp: 130

[fan]
pin: PD2

[heater_fan heatbreak_cooling_fan]
pin: PD3
heater: extruder
heater_temp: 50.0

#[heater_fan fan1]
#pin: PD3

#[heater_fan fan2]
#pin: PD4

#[heater_fan SoC_fan]
#pin: CB1:gpio79
#pin: RPI:gpio26

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b0xx_0E0043000C50415833323420-if00

[printer]
kinematics: deltaxy
max_velocity: 180
max_accel: 3000
max_z_velocity: 25
max_z_accel: 300

[deltaxy]
driveline_separation_mm: 100   # distance between the two lines of motion of the shoulders
build_area_width_mm: 100
build_area_depth_mm: 100
build_area_centerline_offset_mm: 0  # offset between the centerline of the build area and the mid-line between the two drive lines. This is for asymmetric mechanisms

# DeltaXY allows for travel outside the build area. The below parameters limit the motion of the toolhead.
# Tool motion is still subject to the motion limits of the rails. Clipping the left and right-most extremes avoids the only singularities in the mechanism.
toolhead_limit_min_x_mm: -20    # Left-most point of travel of the toolhead, relative to the left edge of build area.
toolhead_limit_max_x_mm: 120    # right-most point of travel of the toolhead, relative to the left edge of the build area.

toolhead_offset_x_mm: 0.0
toolhead_offset_y_mm: 0.0

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]




########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PD6,  EXP1_3=PB9,  EXP1_5=PA15, EXP1_7=PA9,   EXP1_9=<GND>,
    EXP1_2=PB8,  EXP1_4=PC3,  EXP1_6=PA10, EXP1_8=PB5,   EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PB14, EXP2_3=PC11, EXP2_5=PC12, EXP2_7=PC13,  EXP2_9=<GND>,
    EXP2_2=PB13, EXP2_4=PA8,  EXP2_6=PB15, EXP2_8=<RST>, EXP2_10=<NC>

# See the sample-lcd.cfg file for definitions of common LCD displays.

########################################
# TMC2209 configuration
########################################

[tmc2209 stepper_left]
uart_pin: PB12
run_current: 1.0 # RMS value, eventually can set up to 1.4A.
diag_pin:

[tmc2209 stepper_right]
uart_pin: PC10
run_current: 1.0 # RMS value, eventually can set up to 1.4A
diag_pin:

[tmc2209 stepper_z]
uart_pin: PC9
run_current: 1.0 # RMS value, eventually can set up to 1.4A
diag_pin:

[tmc2209 extruder]
uart_pin: PA13
run_current: 0.500
diag_pin:

